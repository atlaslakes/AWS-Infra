AWSTemplateFormatVersion: '2010-09-09'
Description: >
  One-time bootstrap: creates the GitHub Actions OIDC IAM role so GitHub Actions
  can deploy the ERPNext CloudFormation stacks without long-lived AWS keys.

Parameters:
  GitHubOrg:
    Type: String
    Default: atlaslakes
    Description: GitHub organization or username that owns the repo.

  GitHubRepo:
    Type: String
    Default: AWS-Infra
    Description: GitHub repository name (without the org prefix).

  GitHubBranch:
    Type: String
    Default: main
    Description: Branch that is allowed to assume the deploy role.

Resources:
  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActions-ERPNext-Deploy
      Description: Assumed by GitHub Actions to deploy the ERPNext CloudFormation stacks.
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  !Sub repo:${GitHubOrg}/${GitHubRepo}:*
      Policies:
        - PolicyName: ERPNextDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudFormationGlobal
                Effect: Allow
                Action:
                  - cloudformation:ValidateTemplate
                  - cloudformation:ListStacks
                Resource: "*"

              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:ListStackResources
                Resource:
                  - !Sub arn:aws:cloudformation:*:${AWS::AccountId}:stack/erpnext-dev/*
                  - !Sub arn:aws:cloudformation:*:${AWS::AccountId}:stack/erpnext-prod/*
                  - !Sub arn:aws:cloudformation:*:${AWS::AccountId}:stack/github-oidc-erpnext/*

              - Sid: EC2
                Effect: Allow
                Action:
                  - ec2:*
                Resource: "*"

              - Sid: RDS
                Effect: Allow
                Action:
                  - rds:*
                Resource: "*"

              - Sid: ElastiCache
                Effect: Allow
                Action:
                  - elasticache:*
                Resource: "*"

              - Sid: S3
                Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - !Sub arn:aws:s3:::erpnext-dev-*
                  - !Sub arn:aws:s3:::erpnext-dev-*/*
                  - !Sub arn:aws:s3:::erpnext-prod-*
                  - !Sub arn:aws:s3:::erpnext-prod-*/*
                  - !Sub arn:aws:s3:::erpnext-*
                  - !Sub arn:aws:s3:::erpnext-*/*

              - Sid: SecretsManager
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:UpdateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:TagResource
                Resource: !Sub arn:aws:secretsmanager:*:${AWS::AccountId}:secret:*Secret*

              - Sid: SSM
                Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                  - ssm:ListCommands
                  - ssm:StartSession
                  - ssm:DescribeInstanceInformation
                Resource: "*"

              - Sid: CloudFront
                Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                  - cloudfront:UpdateDistribution
                  - cloudfront:DeleteDistribution
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:TagResource
                  - cloudfront:ListDistributions
                Resource: "*"

              - Sid: ACM
                Effect: Allow
                Action:
                  - acm:RequestCertificate
                  - acm:DescribeCertificate
                  - acm:DeleteCertificate
                  - acm:ListCertificates
                  - acm:AddTagsToCertificate
                Resource: "*"

              - Sid: IAMPassRole
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:PassRole
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:TagRole
                Resource: "*"

Outputs:
  RoleArn:
    Description: ARN of the GitHub Actions deploy role.
    Value: !GetAtt GitHubActionsDeployRole.Arn

  OIDCProviderArn:
    Description: Existing GitHub OIDC provider ARN.
    Value: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
