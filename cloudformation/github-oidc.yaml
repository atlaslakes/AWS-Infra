AWSTemplateFormatVersion: '2010-09-09'
Description: >
  One-time bootstrap: creates the GitHub Actions OIDC provider and IAM role
  so GitHub Actions can deploy the erpnext-poc stack without long-lived AWS keys.
  Deploy this ONCE manually before the GitHub Actions workflow runs.

Parameters: 
  GitHubOrg:
    Type: String
    Default: atlaslakes
    Description: GitHub organization or username that owns the repo.

  GitHubRepo:
    Type: String
    Default: AWS-Infra
    Description: GitHub repository name (without the org prefix).

  GitHubBranch:
    Type: String
    Default: main
    Description: Branch that is allowed to assume the deploy role.

Resources:

  # ── IAM role GitHub Actions assumes ─────────────────────────────────────────
  # NOTE: The GitHub OIDC provider (token.actions.githubusercontent.com) already
  # exists in this AWS account. We reference it by its well-known ARN directly.
  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActions-ERPNext-Deploy
      Description: Assumed by GitHub Actions to deploy the erpnext-poc CloudFormation stack.
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # Allows pushes from any branch/tag on this repo.
                # Tighten to a specific branch if desired:
                #   token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}
                token.actions.githubusercontent.com:sub:
                  !Sub repo:${GitHubOrg}/${GitHubRepo}:*

      Policies:
        - PolicyName: ERPNextDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:

              # CloudFormation — full control over the erpnext-poc stack
              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:ValidateTemplate
                  - cloudformation:ListStacks
                  - cloudformation:ListStackResources
                Resource: !Sub arn:aws:cloudformation:*:${AWS::AccountId}:stack/erpnext-poc/*

              # EC2 resources the stack creates
              - Sid: EC2
                Effect: Allow
                Action:
                  - ec2:*
                Resource: "*"

              # RDS
              - Sid: RDS
                Effect: Allow
                Action:
                  - rds:*
                Resource: "*"

              # ElastiCache
              - Sid: ElastiCache
                Effect: Allow
                Action:
                  - elasticache:*
                Resource: "*"

              # S3 (bucket creation, policy, objects)
              - Sid: S3
                Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - !Sub arn:aws:s3:::erpnext-poc-*
                  - !Sub arn:aws:s3:::erpnext-poc-*/*

              # Secrets Manager
              - Sid: SecretsManager
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:UpdateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:TagResource
                Resource: !Sub arn:aws:secretsmanager:*:${AWS::AccountId}:secret:*Secret*

              # SSM — Parameter Store + send commands to EC2
              - Sid: SSM
                Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                  - ssm:ListCommands
                  - ssm:StartSession
                  - ssm:DescribeInstanceInformation
                Resource: "*"

              # IAM — CloudFormation needs to create/pass roles for EC2 instance profile
              - Sid: IAMPassRole
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:PassRole
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:TagRole
                Resource: "*"

Outputs:
  RoleArn:
    Description: ARN of the GitHub Actions deploy role — paste this into GitHub repo settings.
    Value: !GetAtt GitHubActionsDeployRole.Arn

  OIDCProviderArn:
    Description: Existing GitHub OIDC provider ARN (already in account).
    Value: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
