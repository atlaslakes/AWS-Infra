name: Deploy ERPNext Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'cloudformation/erpnext.yaml'
      - 'cloudformation/github-oidc.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      action:
        description: Stack action
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - validate-only

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy CloudFormation Stack
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    env:
      AWS_REGION: us-east-1
      TEMPLATE_FILE: cloudformation/erpnext.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set stack name
        run: echo "STACK_NAME=erpnext-${{ inputs.environment || 'dev' }}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://${{ env.TEMPLATE_FILE }}

      - name: Deploy stack
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.action != 'validate-only' }}
        run: |
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --template-file "${{ env.TEMPLATE_FILE }}" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              Environment=${{ inputs.environment || 'dev' }} \
              KeyPairName=${{ secrets.KEY_PAIR_NAME }} \
              AllowedSSHCidr=${{ secrets.ALLOWED_SSH_CIDR }} \
              ERPNextVersion=v15 \
              DBPassword=${{ secrets.DB_PASSWORD }} \
              DBRootPassword=${{ secrets.DB_ROOT_PASSWORD }} \
              AdminPassword=${{ secrets.ADMIN_PASSWORD }} \
              NotificationEmail=${{ secrets.NOTIFICATION_EMAIL }} \
              EnableHTTPS=${{ secrets.ENABLE_HTTPS }} \
              DomainName=${{ secrets.DOMAIN_NAME }} \
              AlternateDomainName=${{ secrets.ALTERNATE_DOMAIN_NAME }}

      - name: Show stack outputs
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.action != 'validate-only' }}
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs' \
            --output table
