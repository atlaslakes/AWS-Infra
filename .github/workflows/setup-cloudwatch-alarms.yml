name: Setup CloudWatch Alarms

on:
  workflow_dispatch:
    inputs:
      alert_email:
        description: Email address to receive alerts
        required: true
      action:
        description: Install or remove alarms
        required: true
        default: install
        type: choice
        options:
          - install
          - remove

jobs:
  setup-alarms:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.2
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get EC2 instance ID
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:aws:cloudformation:stack-name,Values=erpnext-poc" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text --no-cli-pager)
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "Instance: $INSTANCE_ID"

      - name: Create SNS topic and subscribe email
        if: inputs.action == 'install'
        run: |
          TOPIC_ARN=$(aws sns create-topic \
            --name erpnext-alerts \
            --query "TopicArn" --output text --no-cli-pager)
          echo "TOPIC_ARN=$TOPIC_ARN" >> $GITHUB_ENV
          echo "SNS Topic: $TOPIC_ARN"

          aws sns subscribe \
            --topic-arn "$TOPIC_ARN" \
            --protocol email \
            --notification-endpoint "${{ inputs.alert_email }}" \
            --no-cli-pager
          echo "::notice::Confirmation email sent to ${{ inputs.alert_email }} — check your inbox and confirm the subscription"

      - name: Create EC2 status check alarm
        if: inputs.action == 'install'
        run: |
          aws cloudwatch put-metric-alarm \
            --alarm-name "erpnext-ec2-status-check" \
            --alarm-description "ERPNext EC2 instance failed status check" \
            --metric-name StatusCheckFailed \
            --namespace AWS/EC2 \
            --dimensions Name=InstanceId,Value="$INSTANCE_ID" \
            --statistic Maximum \
            --period 60 \
            --evaluation-periods 2 \
            --threshold 1 \
            --comparison-operator GreaterThanOrEqualToThreshold \
            --alarm-actions "$TOPIC_ARN" \
            --ok-actions "$TOPIC_ARN" \
            --treat-missing-data breaching \
            --no-cli-pager
          echo "EC2 status check alarm created"

      - name: Create high CPU alarm
        if: inputs.action == 'install'
        run: |
          aws cloudwatch put-metric-alarm \
            --alarm-name "erpnext-high-cpu" \
            --alarm-description "ERPNext EC2 CPU above 90% for 10 minutes" \
            --metric-name CPUUtilization \
            --namespace AWS/EC2 \
            --dimensions Name=InstanceId,Value="$INSTANCE_ID" \
            --statistic Average \
            --period 300 \
            --evaluation-periods 2 \
            --threshold 90 \
            --comparison-operator GreaterThanThreshold \
            --alarm-actions "$TOPIC_ARN" \
            --no-cli-pager
          echo "High CPU alarm created"

      - name: Create low disk space alarm (via custom metric check)
        if: inputs.action == 'install'
        run: |
          aws cloudwatch put-metric-alarm \
            --alarm-name "erpnext-rds-storage" \
            --alarm-description "ERPNext RDS free storage below 5GB" \
            --metric-name FreeStorageSpace \
            --namespace AWS/RDS \
            --dimensions Name=DBInstanceIdentifier,Value=erpnext-poc-erpnextdb \
            --statistic Average \
            --period 300 \
            --evaluation-periods 1 \
            --threshold 5368709120 \
            --comparison-operator LessThanThreshold \
            --alarm-actions "$TOPIC_ARN" \
            --no-cli-pager 2>&1 || echo "::warning::RDS alarm skipped (check DB identifier)"
          echo "RDS storage alarm created"

          echo "::notice::3 alarms created: EC2 status check, high CPU, RDS low storage. Check your email to confirm the SNS subscription."

      - name: Remove all alarms and SNS topic
        if: inputs.action == 'remove'
        run: |
          aws cloudwatch delete-alarms \
            --alarm-names "erpnext-ec2-status-check" "erpnext-high-cpu" "erpnext-rds-storage" \
            --no-cli-pager 2>/dev/null || true

          TOPIC_ARN=$(aws sns list-topics \
            --query "Topics[?contains(TopicArn,'erpnext-alerts')].TopicArn" \
            --output text --no-cli-pager)
          if [ -n "$TOPIC_ARN" ]; then
            aws sns delete-topic --topic-arn "$TOPIC_ARN" --no-cli-pager
            echo "SNS topic deleted"
          fi

          echo "::notice::All CloudWatch alarms and SNS topic removed"
