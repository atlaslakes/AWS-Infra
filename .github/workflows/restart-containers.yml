name: Restart ERPNext Containers

on:
  workflow_dispatch:
    inputs:
      action:
        description: Action to perform
        required: true
        default: restart
        type: choice
        options:
          - restart
          - stop
          - start
          - status

jobs:
  restart-containers:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.2
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run SSM command on EC2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:aws:cloudformation:stack-name,Values=erpnext" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text --no-cli-pager)

          echo "Target instance: $INSTANCE_ID"

          case "${{ inputs.action }}" in
            restart)
              CMD="cd /home/ec2-user/frappe_docker && docker compose restart"
              ;;
            stop)
              CMD="cd /home/ec2-user/frappe_docker && docker compose stop"
              ;;
            start)
              CMD="cd /home/ec2-user/frappe_docker && docker compose start"
              ;;
            status)
              CMD="cd /home/ec2-user/frappe_docker && docker compose ps"
              ;;
          esac

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"$CMD\"]" \
            --query "Command.CommandId" \
            --output text --no-cli-pager)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for completion
          for i in $(seq 1 20); do
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text --no-cli-pager 2>/dev/null || echo "Pending")
            echo "Status: $STATUS"
            if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" ]]; then
              break
            fi
          done

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text --no-cli-pager)

          echo "--- Output ---"
          echo "$OUTPUT"

          if [ "$STATUS" != "Success" ]; then
            ERROR=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text --no-cli-pager)
            echo "--- Error ---"
            echo "$ERROR"
            echo "::error::SSM command failed with status: $STATUS"
            exit 1
          fi

          echo "::notice::Action '${{ inputs.action }}' completed successfully"
