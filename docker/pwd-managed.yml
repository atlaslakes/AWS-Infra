services:
  backend:
    image: frappe/erpnext:v15
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  configurator:
    image: frappe/erpnext:v15
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: none
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: erpnext-poc-erpnextdb-ooorv168mrw1.c2diyosis802.us-east-1.rds.amazonaws.com
      DB_PORT: "3306"
      REDIS_CACHE: erp-er-1lbcebhw7tt8c.dj78vm.0001.use1.cache.amazonaws.com:6379
      REDIS_QUEUE: erp-er-p9gezja7h2j8.dj78vm.0001.use1.cache.amazonaws.com:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  create-site:
    image: frappe/erpnext:v15
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: none
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    entrypoint:
      - bash
      - -c
    command:
      - >
        wait-for-it -t 120 erpnext-poc-erpnextdb-ooorv168mrw1.c2diyosis802.us-east-1.rds.amazonaws.com:3306;
        wait-for-it -t 120 erp-er-1lbcebhw7tt8c.dj78vm.0001.use1.cache.amazonaws.com:6379;
        wait-for-it -t 120 erp-er-p9gezja7h2j8.dj78vm.0001.use1.cache.amazonaws.com:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] &&
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] &&
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1
          fi
        done;
        echo "sites/common_site_config.json found";
        bench new-site --mariadb-user-host-login-scope='%' --admin-password=AdminAtlasLakes123! --db-root-username=erpnext --db-root-password=AtlasLakesAws123! --install-app erpnext --set-default frontend;

  frontend:
    image: frappe/erpnext:v15
    networks:
      - frappe_network
    depends_on:
      - websocket
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: frontend
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    ports:
      - "8080:8080"

  queue-long:
    image: frappe/erpnext:v15
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bench
      - worker
      - --queue
      - long,default,short
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://erp-er-1lbcebhw7tt8c.dj78vm.0001.use1.cache.amazonaws.com:6379
      FRAPPE_REDIS_QUEUE: redis://erp-er-p9gezja7h2j8.dj78vm.0001.use1.cache.amazonaws.com:6379

  queue-short:
    image: frappe/erpnext:v15
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bench
      - worker
      - --queue
      - short,default
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://erp-er-1lbcebhw7tt8c.dj78vm.0001.use1.cache.amazonaws.com:6379
      FRAPPE_REDIS_QUEUE: redis://erp-er-p9gezja7h2j8.dj78vm.0001.use1.cache.amazonaws.com:6379

  scheduler:
    image: frappe/erpnext:v15
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bench
      - schedule
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  websocket:
    image: frappe/erpnext:v15
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    environment:
      FRAPPE_REDIS_CACHE: redis://erp-er-1lbcebhw7tt8c.dj78vm.0001.use1.cache.amazonaws.com:6379
      FRAPPE_REDIS_QUEUE: redis://erp-er-p9gezja7h2j8.dj78vm.0001.use1.cache.amazonaws.com:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

volumes:
  sites:
  logs:

networks:
  frappe_network:
    driver: bridge
